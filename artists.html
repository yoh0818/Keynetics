<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — References</title>
<link rel="stylesheet" href="styles.css" />

<style>
:root{
  --blue:#56BDAA; 
}


main{
  height:calc(100vh - 72px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.picker{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.pill{
  width:260px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--blue);
  color:#fff;
  border-radius:999px;
  text-decoration:none;
  font-size:22px;
  font-weight:700;
  transition:.2s ease;
}

.pill:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(0,0,0,.15);
}

@media(max-width:700px){
  .picker{
    flex-direction:column;
    gap:24px;
  }

  .pill{
    width:240px;
    height:84px;
    font-size:20px;
  }
}



.nav-with-icon{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-icon{
  width:16px;
  height:16px;
  object-fit:contain;
  flex:0 0 16px;
}

.hamburger{
  width:44px;
  height:44px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.hamburger__icon{
  font-size:18px;
  line-height:1;
  transform:translateY(-1px);
  color:#56BDAA;
}

.brand strong{
  color:#56BDAA; 
}
</style>
</head>

<body>

<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">

<div class="sidebar__top">
<strong>MENU</strong>
<button class="closebtn" id="closeMenu">×</button>
</div>

<nav>
<ul class="navlist">

<li><a href="index.html">Home</a></li>

<li>
<a href="tutorials.html" class="nav-with-icon">
<img src="1.svg" class="nav-icon">
<span>After Effects Tutorials</span>
</a>
</li>

<li>
<a href="plugins.html" class="nav-with-icon">
<img src="2.svg" class="nav-icon">
<span>Useful Plugins/Scripts</span>
</a>
</li>

<li>
<a href="quiz.html" class="nav-with-icon">
<img src="3.svg" class="nav-icon">
<span>Quiz</span>
</a>
</li>

<li>
<a href="artists.html" class="nav-with-icon">
<img src="4.svg" class="nav-icon">
<span>Motion Graphics Artists/Company</span>
</a>
</li>

</ul>
</nav>

</aside>

<header class="topbar">
  <div class="topbar__inner">

    <button class="hamburger" id="openMenu">
      <span class="hamburger__icon">☰</span>
    </button>

    <div class="brand">
      <strong>Keynetics</strong>
    </div>

  </div>
</header>

<main>
  <div class="picker">
    <a class="pill" href="artists-list.html">Artists</a>
    <a class="pill" href="companies-list.html">Companies</a>
  </div>
</main>

<script>
const openBtn = document.getElementById("openMenu")
const closeBtn = document.getElementById("closeMenu")
const sidebar = document.getElementById("sidebar")
const overlay = document.getElementById("overlay")

function openMenu(){
  sidebar.classList.add("is-open")
  overlay.classList.add("is-open")
  overlay.hidden = false
}

function closeMenu(){
  sidebar.classList.remove("is-open")
  overlay.classList.remove("is-open")
  overlay.hidden = true
}

openBtn.onclick = openMenu
closeBtn.onclick = closeMenu
overlay.onclick = closeMenu
</script>

</body>
</html>

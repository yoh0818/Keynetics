<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — References</title>

<style>
:root{
  --blue:#4f76d6;
  --line:#e9e9e9;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

/* Top */

.topbar{
  height:72px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
}

.topbar__inner{
  width:100%;
  max-width:1100px;
  margin:0 auto;
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.hamburger{
  width:44px;
  height:44px;
  padding:0;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hamburger__icon{
  font-size:18px;
  line-height:1;
  transform:translateY(-1px);
}

.brand strong{
  font-size:14px;
}

/* Menu */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:300px;
  height:100%;
  background:#fff;
  border-right:1px solid var(--line);
  transform:translateX(-100%);
  transition:.2s;
  z-index:20;
}

.sidebar.show{
  transform:translateX(0);
}

.sidebar__top{
  padding:20px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
}

.closebtn{
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  width:36px;
  height:36px;
  cursor:pointer;
}

.navlist{
  list-style:none;
  padding:10px;
  margin:0;
}

.navlist a{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px;
  text-decoration:none;
  color:#111;
  border-radius:10px;
}

.navlist a:hover{
  background:#f6f6f6;
}

.nav-icon{
  width:9px !important;
  height:9px !important;
  min-width:9px !important;
  min-height:9px !important;
  max-width:9px !important;
  max-height:9px !important;
  object-fit:contain;
  flex:0 0 9px !important;
  display:block;
  opacity:.75;
  transform:translateY(1px);
}

.nav-icon-spacer{
  width:9px;
  height:9px;
  flex:0 0 9px;
  display:block;
}


main{
  height:calc(100vh - 72px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.picker{
  display:flex;
  gap:40px;
}

.pill{
  width:260px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--blue);
  color:#fff;
  border-radius:999px;
  text-decoration:none;
  font-size:22px;
  font-weight:700;
  transition:.2s ease;
}

.pill:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>


<aside class="sidebar" id="sidebar">

  <div class="sidebar__top">
    <strong>MENU</strong>
    <button class="closebtn" id="closeMenu">×</button>
  </div>

  <ul class="navlist">

    <li>
      <a href="index.html">
        <span class="nav-icon-spacer"></span>
        <span>Home</span>
      </a>
    </li>

    <li>
      <a href="tutorials.html">
        <img src="1.svg" class="nav-icon" alt="">
        <span>After Effects Tutorials</span>
      </a>
    </li>

    <li>
      <a href="plugins.html">
        <img src="2.svg" class="nav-icon" alt="">
        <span>Useful Plugins/Scripts</span>
      </a>
    </li>

    <li>
      <a href="quiz.html">
        <img src="3.svg" class="nav-icon" alt="">
        <span>Quiz</span>
      </a>
    </li>

    <li>
      <a href="artists.html">
        <img src="4.svg" class="nav-icon" alt="">
        <span>Motion Graphics Artists/Company</span>
      </a>
    </li>

  </ul>

</aside>

<header class="topbar">
  <div class="topbar__inner">

    <button class="hamburger" id="openMenu">
      <span class="hamburger__icon">☰</span>
    </button>

    <div class="brand">
      <strong>Keynetics</strong>
    </div>

  </div>
</header>

<main>
  <div class="picker">
    <a class="pill" href="artists-list.html">Artists</a>
    <a class="pill" href="companies-list.html">Companies</a>
  </div>
</main>

<script>
const openBtn = document.getElementById("openMenu")
const closeBtn = document.getElementById("closeMenu")
const sidebar = document.getElementById("sidebar")
const overlay = document.getElementById("overlay")

openBtn.onclick = () => {
  sidebar.classList.add("show")
  overlay.classList.add("show")
}

closeBtn.onclick = () => {
  sidebar.classList.remove("show")
  overlay.classList.remove("show")
}

overlay.onclick = () => {
  sidebar.classList.remove("show")
  overlay.classList.remove("show")
}
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — Quiz</title>

<style>
:root{
  --bg:#fff; --text:#111; --muted:#666; --line:#e9e9e9; --panel:#f5f5f5;
  --shadow:0 12px 30px rgba(0,0,0,.12);
  --max:1100px; --radius:14px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--text)
}

/* TOP */

.topbar{
position:sticky;
top:0;
z-index:9999;
background:#fff;
border-bottom:1px solid var(--line)
}

.topbar__inner{
max-width:var(--max);
margin:0 auto;
padding:14px 16px;
display:flex;
align-items:center;
gap:12px
}

.hamburger{
width:44px;
height:44px;
padding:0;
border:1px solid var(--line);
border-radius:12px;
background:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center
}

.hamburger__icon{
font-size:18px;
line-height:1;
transform:translateY(-1px);
}

.brand strong{
font-size:14px
}

/* SIDE */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.38);
opacity:0;
pointer-events:none;
transition:opacity .18s ease;
z-index:9998
}

.overlay.is-open{
opacity:1;
pointer-events:auto
}

.sidebar{
position:fixed;
top:0;
left:0;
height:100%;
width:min(340px,88vw);
background:#fff;
border-right:1px solid var(--line);
transform:translateX(-102%);
transition:transform .2s ease;
z-index:9999;
box-shadow:var(--shadow);
display:flex;
flex-direction:column
}

.sidebar.is-open{
transform:translateX(0)
}

.sidebar__top{
padding:16px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid var(--line)
}

.closebtn{
width:40px;
height:40px;
border-radius:12px;
border:1px solid var(--line);
background:#fff;
cursor:pointer;
font-size:18px
}

nav[aria-label="Primary"]{
padding:10px 10px 16px
}

.navlist{
list-style:none;
margin:0;
padding:0;
display:grid;
gap:6px
}

.navlist a{
display:flex;
align-items:center;
gap:8px;
padding:12px;
border-radius:12px;
text-decoration:none;
color:#111;
border:1px solid transparent
}

.navlist a:hover{
background:#fafafa;
border-color:var(--line)
}

.navlist a.is-active{
background:#fafafa;
border-color:var(--line);
font-weight:700
}

.sidebar__footer{
margin-top:auto;
padding:14px 16px;
border-top:1px solid var(--line);
font-size:12px;
color:var(--muted)
}

/* MENU ICONS */

.nav-icon{
width:9px !important;
height:9px !important;
min-width:9px !important;
min-height:9px !important;
max-width:9px !important;
max-height:9px !important;
object-fit:contain;
flex:0 0 9px !important;
display:block;
opacity:.75;
transform:translateY(1px)
}

.nav-icon-spacer{
width:9px;
height:9px;
flex:0 0 9px;
display:block
}

/* QUIZ CARD */

.wrapper{
min-height:calc(100vh - 72px);
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px
}

.card{
width:min(800px,100%);
background:var(--panel);
border:1px solid #ddd;
border-radius:20px;
padding:50px
}

h1{
margin:0 0 30px;
font-size:clamp(26px,3vw,34px)
}

.option{
display:block;
width:100%;
padding:18px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #000;
background:#fff;
cursor:pointer;
font-size:16px;
transition:.15s
}

.option:hover{
background:#000;
color:#fff
}

.option.correct{
background:#000;
color:#fff
}

.option.wrong{
background:#ccc
}

.actions{
display:flex;
justify-content:space-between;
margin-top:40px
}

.btn{
padding:14px 28px;
border-radius:12px;
border:1px solid #000;
background:#fff;
cursor:pointer;
font-size:15px;
transition:.15s
}

.btn:hover{
background:#000;
color:#fff
}

</style>
</head>

<body>

<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar">

<div class="sidebar__top">
<strong>MENU</strong>
<button class="closebtn" id="closeMenu">×</button>
</div>

<nav aria-label="Primary">

<ul class="navlist">

<li>
<a href="index.html">
<span class="nav-icon-spacer"></span>
<span>Home</span>
</a>
</li>

<li>
<a href="tutorials.html">
<img src="1.svg" class="nav-icon">
<span>After Effects Tutorials</span>
</a>
</li>

<li>
<a href="plugins.html">
<img src="2.svg" class="nav-icon">
<span>Useful Plugins/Scripts</span>
</a>
</li>

<li>
<a href="quiz.html">
<img src="3.svg" class="nav-icon">
<span>Quiz</span>
</a>
</li>

<li>
<a href="artists.html">
<img src="4.svg" class="nav-icon">
<span>Motion Graphics Artists/Company</span>
</a>
</li>

</ul>

</nav>

<div class="sidebar__footer">Quiz</div>

</aside>

<header class="topbar">

<div class="topbar__inner">

<button class="hamburger" id="openMenu">
<span class="hamburger__icon">☰</span>
</button>

<div class="brand">
<strong>Keynetics</strong>
</div>

</div>

</header>

<div class="wrapper">

<div class="card">

<h1>Select the option that is not a feature for controlling speed in After Effects.</h1>

<button class="option" data-answer="wrong">1. Speed Graph</button>
<button class="option" data-answer="wrong">2. Value Graph</button>
<button class="option" data-answer="wrong">3. Keyframe Velocity</button>
<button class="option" data-answer="correct">4. Keyframe Interpolation</button>

<div class="actions">

<button class="btn" onclick="location.href='index.html'">
Home Page
</button>

<button class="btn" onclick="restartQuiz()">
Restart
</button>

</div>

</div>

</div>

<script>

const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');
const openBtn=document.getElementById('openMenu');
const closeBtn=document.getElementById('closeMenu');

function openMenu(){
sidebar.classList.add('is-open');
overlay.classList.add('is-open');
overlay.hidden=false;
}

function closeMenu(){
sidebar.classList.remove('is-open');
overlay.classList.remove('is-open');
overlay.hidden=true;
}

openBtn.onclick=openMenu;
closeBtn.onclick=closeMenu;
overlay.onclick=closeMenu;

const current=location.pathname.split('/').pop()||'index.html';

document.querySelectorAll('.navlist a').forEach(a=>{
if(a.getAttribute('href')===current)
a.classList.add('is-active');
});

const options=document.querySelectorAll('.option');

options.forEach(option=>{
option.addEventListener('click',()=>{

options.forEach(o=>o.disabled=true);

if(option.dataset.answer==="correct"){
option.classList.add('correct');
}

else{
option.classList.add('wrong');
document.querySelector('[data-answer="correct"]').classList.add('correct');
}

});
});

function restartQuiz(){

options.forEach(o=>{
o.disabled=false;
o.classList.remove('correct','wrong');
});

}

</script>

</body>
</html>

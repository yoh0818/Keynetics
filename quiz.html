<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — Quiz</title>
<link rel="stylesheet" href="styles.css" />

<style>
:root{
  --quiz-accent:#9B55D8;
}

/* Keyframe Design */

.bg-svg{
  position:fixed;
  pointer-events:none;
  opacity:.2;
  z-index:0;
}

.bg-svg.top-right{
  top:-250px;
  right:-230px;
  width:600px;
}

.bg-svg.bottom-left{
  bottom:-300px;
  left:-150px;
  width:600px;
}


.wrapper{
min-height:calc(100vh - 72px);
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
position:relative;
z-index:1;
}

.card{
width:min(800px,100%);
background:#fff;
border:1px solid #000;
border-radius:20px;
padding:50px
}

h1{
margin:0 0 30px;
font-size:clamp(26px,3vw,34px);
color:#9B55D8;
}

.option{
display:block;
width:100%;
padding:18px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #000;
background:#fff;
cursor:pointer;
font-size:16px;
transition:.15s;
text-align:left
}

.option:hover{
background:#9B55D8;
border-color:#9B55D8;
color:#fff
}

.option.correct{
background:#22c55e;
border-color:#22c55e;
color:#fff
}

.option.wrong{
background:#ccc
}

.actions{
width:100%;
margin-top:40px;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
}

.actions .left{
justify-self:center;
transform:translateX(-80px);
}

.actions .center{
justify-self:center;
}

.actions .right{
justify-self:center;
transform:translateX(80px);
}

.btn{
padding:14px 28px;
border-radius:12px;
border:1px solid #000;
background:#fff;
color:#111;
cursor:pointer;
font-size:15px;
transition:.15s
}

.btn:hover{
background:#9B55D8;
border-color:#9B55D8;
color:#fff
}

.btn:disabled{
opacity:.45;
cursor:default;
}

.btn:disabled:hover{
background:#fff;
color:#111
}

.progress{
margin-bottom:18px;
color:#666;
font-size:14px
}

/* nav */
.nav-with-icon{
display:flex;
align-items:center;
gap:10px;
}

.nav-icon{
width:16px;
height:16px;
object-fit:contain;
flex:0 0 16px;
}

.hamburger{
width:44px;
height:44px;
border:1px solid var(--line);
border-radius:12px;
background:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
padding:0;
}

.hamburger__icon{
font-size:18px;
line-height:1;
transform:translateY(-1px);
color:#9B55D8;
}

.brand strong{
color:#9B55D8;
}
</style>
</head>

<body>


<img src="3(storke).svg" class="bg-svg top-right">
<img src="3(storke).svg" class="bg-svg bottom-left">

<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">

<div class="sidebar__top">
<strong>MENU</strong>
<button class="closebtn" id="closeMenu">×</button>
</div>

<nav>
<ul class="navlist">

<li><a href="index.html">Home</a></li>

<li>
<a href="tutorials.html" class="nav-with-icon">
<img src="1.svg" class="nav-icon">
<span>After Effects Tutorials</span>
</a>
</li>

<li>
<a href="plugins.html" class="nav-with-icon">
<img src="2.svg" class="nav-icon">
<span>Useful Plugins/Scripts</span>
</a>
</li>

<li>
<a href="quiz.html" class="nav-with-icon">
<img src="3.svg" class="nav-icon">
<span>Quiz</span>
</a>
</li>

<li>
<a href="artists.html" class="nav-with-icon">
<img src="4.svg" class="nav-icon">
<span>Motion Graphics Artists/Company</span>
</a>
</li>

</ul>
</nav>

</aside>

<header class="topbar">

<div class="topbar__inner">

<button class="hamburger" id="openMenu">
<span class="hamburger__icon">☰</span>
</button>

<div class="brand">
<strong>Keynetics</strong>
</div>

</div>

</header>

<div class="wrapper">
<div class="card">

<div class="progress" id="progress"></div>
<h1 id="question"></h1>

<div id="options"></div>

<div class="actions">
  <div class="left">
    <button class="btn" id="backBtn" onclick="prevQuestion()">Back</button>
  </div>

  <div class="center">
    <button class="btn" onclick="restartQuiz()">Restart</button>
  </div>

  <div class="right">
    <button class="btn" id="nextBtn" onclick="nextQuestion()">Next</button>
  </div>
</div>

</div>
</div>

<script>
const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const openBtn=document.getElementById("openMenu")
const closeBtn=document.getElementById("closeMenu")

function openMenu(){
sidebar.classList.add("is-open")
overlay.classList.add("is-open")
overlay.hidden=false
}

function closeMenu(){
sidebar.classList.remove("is-open")
overlay.classList.remove("is-open")
overlay.hidden=true
}

openBtn.onclick=openMenu
closeBtn.onclick=closeMenu
overlay.onclick=closeMenu

const quizData = [
{
question:"Select the option that is not a feature for controlling speed in After Effects.",
options:["1. Speed Graph","2. Value Graph","3. Keyframe Velocity","4. Keyframe Interpolation"],
correct:3
},
{
question:"Why do designers use a Null Object?",
options:["1. To apply color effects","2. To control multiple layers with one controller","3. To export videos faster","4. To reduce file size"],
correct:1
},
{
question:"What is the purpose of an Adjustment Layer?",
options:["1. To create 3D objects","2. To apply effects to all layers below it","3. To animate text only","4. To render compositions"],
correct:1
},
{
question:"What is a Track Matte used for in After Effects?",
options:["1. To apply color correction","2. To control visibility using another layer’s alpha or luminance","3. To animate text speed","4. To export video"],
correct:1
},
{
question:"Which keyframe type creates constant speed without easing?",
options:["1. Easy Ease","2. Bezier","3. Linear","4. Hold"],
correct:2
},
{
question:"Why might a 3D layer not respond to the camera?",
options:["1. It has too many effects","2. It is not set as a 3D layer","3. Motion blur is off","4. Opacity is 100%"],
correct:1
},
{
question:"Which of the following is NOT a shortcut key used to reveal a keyframe property in After Effects?",
options:["1. P (Position)","2. S (Scale)","3. O (Opacity)","4. R (Rotation)"],
correct:2
}
];

let currentQuestion=0;
let answered=false;

function renderQuestion(){
const q=quizData[currentQuestion];
document.getElementById("progress").textContent=`Question ${currentQuestion+1} / ${quizData.length}`;
document.getElementById("question").textContent=q.question;

const box=document.getElementById("options");
box.innerHTML="";
answered=false;

document.getElementById("backBtn").disabled=currentQuestion===0;
document.getElementById("nextBtn").textContent=currentQuestion===quizData.length-1?"Finish":"Next";

q.options.forEach((opt,i)=>{
const btn=document.createElement("button");
btn.className="option";
btn.textContent=opt;
btn.onclick=()=>selectAnswer(btn,i);
box.appendChild(btn);
});
}

function selectAnswer(btn,i){
if(answered)return;
answered=true;

const q=quizData[currentQuestion];
document.querySelectorAll(".option").forEach((b,index)=>{
b.disabled=true;
if(index===q.correct)b.classList.add("correct");
if(index===i&&i!==q.correct)b.classList.add("wrong");
});
}

function nextQuestion(){
currentQuestion=(currentQuestion+1)%quizData.length;
renderQuestion();
}

function prevQuestion(){
if(currentQuestion>0){currentQuestion--;renderQuestion();}
}

function restartQuiz(){
currentQuestion=0;
renderQuestion();
}

renderQuestion();
</script>

</body>
</html>

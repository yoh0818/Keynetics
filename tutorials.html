<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — Tutorials</title>

<style>
:root{
  --bg:#fff; --text:#111; --muted:#666; --line:#e9e9e9; --panel:#fafafa;
  --shadow:0 12px 30px rgba(0,0,0,.12);
  --max:1100px; --radius:14px;
  --blue:#4f76d6;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45}


.topbar{position:sticky;top:0;z-index:9999;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar__inner{max-width:var(--max);margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:12px}
.hamburger{
  width:44px;
  height:44px;
  padding:0;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  color:#111;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  appearance:none;
  -webkit-appearance:none;
}
.hamburger__icon{
  display:block;
  width:18px;
  height:18px;
  line-height:18px;
  text-align:center;
  font-size:18px;
  transform:translateY(-1px);
  color:#3F75E0; /* 🔥 변경 */
}
.brand strong{
  font-size:14px;
  letter-spacing:.02em;
  color:#3F75E0; /* 🔥 변경 */
}


.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:9998}
.overlay.is-open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;height:100%;width:min(340px,88vw);background:#fff;border-right:1px solid var(--line);transform:translateX(-102%);transition:transform .2s ease;z-index:9999;box-shadow:var(--shadow);display:flex;flex-direction:column}
.sidebar.is-open{transform:translateX(0)}
.sidebar__top{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.closebtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:#fff;color:#111;cursor:pointer;font-size:18px;line-height:1}
nav[aria-label="Primary"]{padding:10px 10px 16px}
.navlist{list-style:none;margin:0;padding:0;display:grid;gap:6px}
.navlist a{display:block;padding:12px;border-radius:12px;text-decoration:none;color:#111;border:1px solid transparent}
.navlist a:hover{background:var(--panel);border-color:var(--line)}
.navlist a.is-active{background:var(--panel);border-color:var(--line);font-weight:700}
.sidebar__footer{margin-top:auto;padding:14px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}

/* menu icons */
.nav-with-icon{
display:flex !important;
align-items:center !important;
gap:8px !important;
}
.nav-icon{
width:9px !important;
height:9px !important;
min-width:9px !important;
min-height:9px !important;
max-width:9px !important;
max-height:9px !important;
object-fit:contain;
flex:0 0 9px !important;
display:block !important;
opacity:.72 !important;
transform:translateY(1px) !important;
}
.nav-icon-spacer{
width:9px !important;
height:9px !important;
min-width:9px !important;
min-height:9px !important;
max-width:9px !important;
max-height:9px !important;
flex:0 0 9px !important;
display:block !important;
}

/* MAIN */
main{height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:20px}
.level-row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
.pill-link{
width:260px;height:90px;border-radius:999px;
background:var(--blue);color:#fff;text-decoration:none;
display:flex;align-items:center;justify-content:center;
font-size:22px;font-weight:800;
box-shadow:0 0 0 rgba(0,0,0,0);
transition:transform .15s ease, box-shadow .15s ease;
position:relative; overflow:hidden;
}
.pill-link:hover{transform:translateY(-3px);box-shadow:0 14px 28px rgba(0,0,0,.10)}
.pill-link::before{
content:"";
position:absolute; inset:10px;
background:url("Icon.svg") center/contain no-repeat;
opacity:.18;
pointer-events:none;
}
.pill-link span{position:relative; z-index:1}
</style>
</head>

<body>
<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">
<div class="sidebar__top">
<strong>MENU</strong>
<button class="closebtn" id="closeMenu">×</button>
</div>

<nav aria-label="Primary">
<ul class="navlist">

<li>
<a href="index.html" class="nav-with-icon">
<span class="nav-icon-spacer"></span>
<span>Home</span>
</a>
</li>

<li>
<a href="tutorials.html" class="nav-with-icon">
<img src="1.svg" class="nav-icon" alt="">
<span>After Effects Tutorials</span>
</a>
</li>

<li>
<a href="plugins.html" class="nav-with-icon">
<img src="2.svg" class="nav-icon" alt="">
<span>Useful Plugins/Scripts</span>
</a>
</li>

<li>
<a href="quiz.html" class="nav-with-icon">
<img src="3.svg" class="nav-icon" alt="">
<span>Quiz</span>
</a>
</li>

<li>
<a href="artists.html" class="nav-with-icon">
<img src="4.svg" class="nav-icon" alt="">
<span>Motion Graphics Artists/Company</span>
</a>
</li>

</ul>
</nav>

<div class="sidebar__footer">Tutorials</div>
</aside>

<header class="topbar">
<div class="topbar__inner">
<button class="hamburger" id="openMenu">
  <span class="hamburger__icon">☰</span>
</button>
<div class="brand">
<strong>Keynetics</strong>
</div>
</div>
</header>

<main>
<section class="level-row">
<a class="pill-link" href="tutorials-beginner.html"><span>Beginner</span></a>
<a class="pill-link" href="tutorials-intermediate.html"><span>Intermediate</span></a>
<a class="pill-link" href="tutorials-advanced.html"><span>Advanced</span></a>
</section>
</main>

<script>
const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');
const openBtn=document.getElementById('openMenu');
const closeBtn=document.getElementById('closeMenu');

function openMenu(){
sidebar.classList.add('is-open');
overlay.classList.add('is-open');
overlay.hidden=false;
}

function closeMenu(){
sidebar.classList.remove('is-open');
overlay.classList.remove('is-open');
overlay.hidden=true;
}

openBtn.onclick=openMenu;
closeBtn.onclick=closeMenu;
overlay.onclick=closeMenu;

const current = location.pathname.split('/').pop() || 'index.html';
document.querySelectorAll('.navlist a').forEach(a=>{
if(a.getAttribute('href')===current) a.classList.add('is-active');
});
</script>
</body>
</html>

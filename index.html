<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics</title>
<link rel="stylesheet" href="styles.css" />

<style>
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,
    rgba(255,255,255,0.95),
    rgba(255,255,255,0.7) 40%,
    rgba(245,245,245,0.9) 100%);
}

/* Video */

.intro-screen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  background:#000;
  transition:opacity .6s ease;
}

.intro-screen video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.intro-screen.hide{
  opacity:0;
  pointer-events:none;
  visibility:hidden;
}

/* Center */

.home-wrap{
  min-height:calc(100dvh - 72px);
  display:grid;
  place-items:center;
  padding:16px;
}

.hero{
  width:min(760px,100%);
  padding:48px;
  border-radius:28px;
  background:rgba(255,255,255,0.45);
  border:1px solid rgba(255,255,255,0.7);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:
    0 20px 50px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.8);
}

.hero h1{
  margin:0 0 16px;
  font-size:clamp(36px,4vw,48px);
  color:#111;
}

.hero p{
  margin:0;
  font-size:18px;
  color:#333;
  line-height:1.6;
}

/* Menu Icons */

.nav-with-icon{
  display:flex;
  align-items:center;
  gap:10px;
}

.hamburger{
  width:44px;
  height:44px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.hamburger__icon{
  font-size:18px;
  line-height:1;
  transform:translateY(-1px);
}

/* Mobile */

@media (max-width: 768px){
  .home-wrap{
    min-height:calc(100dvh - 72px);
    padding:20px 14px;
  }

  .hero{
    width:min(420px,100%);
    padding:28px 20px;
    border-radius:20px;
  }

  .hero h1{
    font-size:clamp(28px, 8vw, 36px);
    line-height:1.15;
  }

  .hero p{
    font-size:15px;
    line-height:1.55;
  }
}

@media (max-width: 480px){
  .home-wrap{
    min-height:calc(100dvh - 72px);
    padding:18px 12px;
  }

  .hero{
    width:100%;
    padding:22px 16px;
    border-radius:16px;
  }

  .hero h1{
    font-size:clamp(24px, 9vw, 30px);
  }

  .hero p{
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="intro-screen" id="intro">
  <video autoplay muted playsinline id="introVideo">
    <source src="Final Intro.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">

  <div class="sidebar__top">
    <strong>MENU</strong>
    <button class="closebtn" id="closeMenu" aria-label="Close menu">×</button>
  </div>

  <nav aria-label="Primary">
    <ul class="navlist">

      <li><a href="index.html" class="is-active">Home</a></li>

      <li>
        <a href="tutorials.html" class="nav-with-icon">
          <img src="1.svg" class="nav-icon" alt="">
          <span>After Effects Tutorials</span>
        </a>
      </li>

      <li>
        <a href="plugins.html" class="nav-with-icon">
          <img src="2.svg" class="nav-icon" alt="">
          <span>Useful Plugins/Scripts</span>
        </a>
      </li>

      <li>
        <a href="quiz.html" class="nav-with-icon">
          <img src="3.svg" class="nav-icon" alt="">
          <span>Quiz</span>
        </a>
      </li>

      <li>
        <a href="artists.html" class="nav-with-icon">
          <img src="4.svg" class="nav-icon" alt="">
          <span>Motion Graphics Artists &amp; Companies</span>
        </a>
      </li>

    </ul>
  </nav>

</aside>

<header class="topbar">
  <div class="topbar__inner">

    <button class="hamburger" id="openMenu" aria-label="Open menu" aria-expanded="false">
      <span class="hamburger__icon">☰</span>
    </button>

    <div class="brand">
      <strong>Keynetics</strong>
    </div>

  </div>
</header>

<main class="home-wrap">
  <div class="hero">
    <h1>Welcome.</h1>
    <p>
      This website is designed to help you study After Effects and Motion Design.
      <br><br>
      Please use the menu (☰) to move between pages.
    </p>
  </div>
</main>

<script src="app.js"></script>
<script>
const intro = document.getElementById("intro");
const introVideo = document.getElementById("introVideo");

introVideo.onended = () => {
  intro.classList.add("hide");
};
</script>

</body>
</html>

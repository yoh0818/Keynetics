<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics</title>
<link rel="stylesheet" href="styles.css" />

<style>



body{
min-height:100vh;
background:
radial-gradient(circle at top left,
rgba(255,255,255,0.95),
rgba(255,255,255,0.7) 40%,
rgba(245,245,245,0.9) 100%);
}

/* Video */

.intro-screen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
background:#000;
transition:opacity .6s ease;
}

.intro-screen video{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.intro-screen.hide{
opacity:0;
pointer-events:none;
}

/* Center */

.home-wrap{
min-height:calc(100vh - 72px);
display:flex;
align-items:center;
justify-content:center;
padding:40px 16px;
}

.hero{
width:min(760px,100%);
padding:48px;
border-radius:28px;

background:rgba(255,255,255,0.45);
border:1px solid rgba(255,255,255,0.7);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

box-shadow:
0 20px 50px rgba(0,0,0,.08),
inset 0 1px 0 rgba(255,255,255,.8);
}

.hero h1{
margin:0 0 16px;
font-size:clamp(36px,4vw,48px);
color:#111;
}

.hero p{
margin:0;
font-size:18px;
color:#333;
line-height:1.6;
}

/* Menu Icons */

.nav-with-icon{
display:flex;
align-items:center;
gap:10px;
}

.nav-icon{
width:16px;
height:16px;
object-fit:contain;
flex:0 0 16px;
}

.hamburger{
width:44px;
height:44px;
border:1px solid var(--line);
border-radius:12px;
background:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
padding:0;
}

.hamburger__icon{
font-size:18px;
line-height:1;
transform:translateY(-1px);
}

</style>
</head>

<body>

<div class="intro-screen" id="intro">
<video autoplay muted playsinline id="introVideo">
<source src="Final Intro.mp4" type="video/mp4">
</video>
</div>

<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">

<div class="sidebar__top">
<strong>MENU</strong>
<button class="closebtn" id="closeMenu">×</button>
</div>

<nav>
<ul class="navlist">

<li><a href="index.html">Home</a></li>

<li>
<a href="tutorials.html" class="nav-with-icon">
<img src="1.svg" class="nav-icon">
<span>After Effects Tutorials</span>
</a>
</li>

<li>
<a href="plugins.html" class="nav-with-icon">
<img src="2.svg" class="nav-icon">
<span>Useful Plugins/Scripts</span>
</a>
</li>

<li>
<a href="quiz.html" class="nav-with-icon">
<img src="3.svg" class="nav-icon">
<span>Quiz</span>
</a>
</li>

<li>
<a href="artists.html" class="nav-with-icon">
<img src="4.svg" class="nav-icon">
<span>Motion Graphics Artists/Company</span>
</a>
</li>

</ul>
</nav>

</aside>

<header class="topbar">

<div class="topbar__inner">

<button class="hamburger" id="openMenu">
<span class="hamburger__icon">☰</span>
</button>

<div class="brand">
<strong>Keynetics</strong>
</div>

</div>

</header>

<main class="home-wrap">

<div class="hero">

<h1>Welcome.</h1>

<p>
This is the website that will help you study
After Effects and Motion Design.
<br><br>
Please use the menu (☰) to move between pages.
</p>

</div>

</main>

<script>

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const openBtn=document.getElementById("openMenu")
const closeBtn=document.getElementById("closeMenu")

function openMenu(){
sidebar.classList.add("is-open")
overlay.classList.add("is-open")
overlay.hidden=false
}

function closeMenu(){
sidebar.classList.remove("is-open")
overlay.classList.remove("is-open")
overlay.hidden=true
}

openBtn.onclick=openMenu
closeBtn.onclick=closeMenu
overlay.onclick=closeMenu

const intro=document.getElementById("intro")
const introVideo=document.getElementById("introVideo")

introVideo.onended=()=>{
intro.classList.add("hide")
}

</script>

</body>
</html>
